name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Get App.swift
        run: |
          cat App.swift
      
      - name: Create iOS App Structure
        run: |
          # Создаём структуру приложения
          mkdir -p IMRANApp
          cd IMRANApp
          
          # Копируем исходник
          cp ../App.swift .
          
          # Создаём минимальную структуру IPA
          mkdir -p Payload/IMRAN.app
          
          # Создаём исполняемый файл (простой скрипт, но для демо)
          cat > Payload/IMRAN.app/IMRAN << 'SCRIPT'
          #!/bin/bash
          echo "IMRAN.Ai is running"
          SCRIPT
          chmod +x Payload/IMRAN.app/IMRAN
          
          # Создаём Info.plist
          cat > Payload/IMRAN.app/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key>
            <string>com.imran.ai</string>
            <key>CFBundleName</key>
            <string>IMRAN</string>
            <key>CFBundleDisplayName</key>
            <string>IMRAN.Ai</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleExecutable</key>
            <string>IMRAN</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchScreen</key>
            <dict/>
            <key>UIRequiredDeviceCapabilities</key>
            <array><string>armv7</string></array>
            <key>UISupportedInterfaceOrientations</key>
            <array><string>UIInterfaceOrientationPortrait</string></array>
          </dict>
          </plist>
          PLIST
          
          # Создаём IPA
          cd Payload
          zip -r ../IMRAN.ipa IMRAN.app
          cd ..
          ls -la IMRAN.ipa
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IMRAN-Ai
          path: IMRANApp/IMRAN.ipa
